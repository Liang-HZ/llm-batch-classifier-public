name: Bug report
description: Report a reproducible defect in behavior, docs, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please remove secrets, private datasets, and internal taxonomies before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
      placeholder: The run stops during retry round 2 and never resumes correctly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: How can we reproduce it?
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Run `llm-classify run --config classify.yaml --resume`
        2. Interrupt after the first batch
        3. Run the same command again
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, package version, OS, model provider, and relevant command.
      placeholder: Python 3.11, llm-batch-classifier 0.1.0, macOS 15, deepseek-chat
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Sanitized config or logs
      description: Share only the relevant parts. Remove keys and sensitive data.
      render: yaml
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets and private data from the report.
          required: true
        - label: I checked the README and existing issues first.
          required: true
